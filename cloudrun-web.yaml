apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: wrightai-web
  labels:
    cloud.googleapis.com/location: asia-southeast1
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      serviceAccountName: wrightai-cloudrun@wrightai.iam.gserviceaccount.com
      containerConcurrency: 80
      timeoutSeconds: 60
      containers:
      - image: asia-southeast1-docker.pkg.dev/wrightai/wrightai/web:latest
        ports:
        - name: http1
          containerPort: 3000
        resources:
          limits:
            memory: 1Gi
            cpu: "1"
        env:
        - name: APP_URL
          value: https://www.wrightai.live
        - name: NODE_ENV
          value: production
        - name: NEXT_TELEMETRY_DISABLED
          value: "1"
