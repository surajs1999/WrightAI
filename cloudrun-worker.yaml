apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: wrightai-worker
  labels:
    cloud.googleapis.com/location: asia-southeast1
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        # Always keep one instance alive — worker must be running to process
        # quota alert emails and onboarding drips. Scale up for burst workloads.
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "3"
        run.googleapis.com/execution-environment: gen2
    spec:
      serviceAccountName: wrightai-cloudrun@wrightai.iam.gserviceaccount.com
      containerConcurrency: 1
      timeoutSeconds: 3600
      containers:
      - image: asia-southeast1-docker.pkg.dev/wrightai/wrightai/api:latest
        # Run Celery worker + Beat scheduler in one process.
        # --beat means this container also handles periodic tasks (daily drip).
        # Only one worker instance should run --beat; Cloud Run enforces this
        # via minScale/maxScale both being 1 for the beat role. Additional
        # instances spun up for burst will run as pure workers (no --beat).
        command: ["/bin/bash", "/start_worker.sh"]
        resources:
          limits:
            memory: 1Gi
            cpu: "2"
        env:
        - name: CHROMA_PATH
          value: /data/chroma
        - name: SQLITE_CACHE_PATH
          value: /data/ast_cache.db
        - name: REPOS_PATH
          value: /data/repos
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: anthropic-api-key
              key: latest
        - name: VOYAGE_API_KEY
          valueFrom:
            secretKeyRef:
              name: voyage-api-key
              key: latest
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: redis-url
              key: latest
        - name: SUPABASE_URL
          valueFrom:
            secretKeyRef:
              name: supabase-url
              key: latest
        - name: SUPABASE_SERVICE_KEY
          valueFrom:
            secretKeyRef:
              name: supabase-service-key
              key: latest
        - name: BREVO_API_KEY
          valueFrom:
            secretKeyRef:
              name: brevo-api-key
              key: latest
        - name: BREVO_FROM_EMAIL
          value: hello@wrightai.live
        - name: PADDLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: paddle-api-key
              key: latest
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        csi:
          driver: gcsfuse.run.googleapis.com
          readOnly: false
          volumeAttributes:
            bucketName: wrightai-data
