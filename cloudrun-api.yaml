apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: wrightai-api
  labels:
    cloud.googleapis.com/location: asia-southeast1
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      serviceAccountName: wrightai-cloudrun@wrightai.iam.gserviceaccount.com
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
      - image: asia-southeast1-docker.pkg.dev/wrightai/wrightai/api:latest
        ports:
        - name: http1
          containerPort: 8080
        resources:
          limits:
            memory: 512Mi
            cpu: "1"
        env:
        - name: WRIGHT_API_URL
          value: https://api.wrightai.live
        - name: CORS_ORIGINS
          value: https://wrightai.live,https://www.wrightai.live,http://localhost:3000
        - name: CHROMA_PATH
          value: /data/chroma
        - name: SQLITE_CACHE_PATH
          value: /data/ast_cache.db
        - name: REPOS_PATH
          value: /data/repos
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: anthropic-api-key
              key: latest
        - name: VOYAGE_API_KEY
          valueFrom:
            secretKeyRef:
              name: voyage-api-key
              key: latest
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        csi:
          driver: gcsfuse.run.googleapis.com
          readOnly: false
          volumeAttributes:
            bucketName: wrightai-data
