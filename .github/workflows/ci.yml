name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check . && ruff format --check .

      - name: Test
        run: pytest tests/ -v

  security:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -e ".[dev]" pip-audit

      - name: Audit dependencies for CVEs
        # PYSEC-2025-183 (pyjwt) and PYSEC-2025-185 (python-jose) have no fix versions yet
        run: pip-audit --skip-editable --ignore-vuln PYSEC-2025-183 --ignore-vuln PYSEC-2025-185
