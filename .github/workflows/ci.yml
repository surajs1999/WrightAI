name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check . && ruff format --check .

      - name: Test
        run: pytest tests/ -v

  web:
    name: Web Type-check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: web

      - name: TypeScript
        run: npx tsc --noEmit
        working-directory: web

      - name: ESLint
        run: npx eslint .
        working-directory: web

      - name: Build
        run: npm run build 2>&1 | tee /tmp/next-build.log; exit ${PIPESTATUS[0]}
        working-directory: web
        env:
          NEXT_PUBLIC_API_URL: https://api.wrightai.live
          NEXT_PUBLIC_APP_URL: https://wrightai.live
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_PADDLE_CLIENT_TOKEN: ${{ secrets.NEXT_PUBLIC_PADDLE_CLIENT_TOKEN }}

      - name: Show build error (on failure)
        if: failure()
        run: grep -E "Error|error|Failed|failed|warn|WARN" /tmp/next-build.log | tail -50

  security:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -e ".[dev]" pip-audit

      - name: Audit dependencies for CVEs
        # PYSEC-2025-185 (python-jose) and CVE-2026-45829 (chromadb) — no fix versions yet
        run: pip-audit --skip-editable --ignore-vuln PYSEC-2025-185 --ignore-vuln CVE-2026-45829
