name: Deploy API → Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "core/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "cloudrun-api.yaml"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t asia-southeast1-docker.pkg.dev/wrightai/wrightai/api:${{ github.sha }} \
            -t asia-southeast1-docker.pkg.dev/wrightai/wrightai/api:latest \
            .

      - name: Push image to Artifact Registry
        run: |
          docker push asia-southeast1-docker.pkg.dev/wrightai/wrightai/api:${{ github.sha }}
          docker push asia-southeast1-docker.pkg.dev/wrightai/wrightai/api:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run services replace cloudrun-api.yaml \
            --region=asia-southeast1

      - name: Print deployed URL
        run: |
          URL=$(gcloud run services describe wrightai-api \
            --region=asia-southeast1 \
            --format="value(status.url)")
          echo "✓ API deployed: $URL"
