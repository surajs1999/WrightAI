repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: no-middleware-ts
        name: Block middleware.ts (deprecated in Next.js 16, use proxy.ts)
        language: system
        entry: bash -c 'git diff --cached --name-only | grep -q "^web/middleware\.ts$" && echo "ERROR - web/middleware.ts is deprecated in Next.js 16, use web/proxy.ts" && exit 1 || exit 0'
        pass_filenames: false
        always_run: true
      - id: web-typecheck
        name: Web TypeScript check
        language: system
        entry: bash -c 'cd web && npx tsc --noEmit'
        pass_filenames: false
        files: ^web/.*\.(ts|tsx)$
      - id: web-eslint
        name: Web ESLint
        language: system
        entry: bash -c 'cd web && npx eslint .'
        pass_filenames: false
        files: ^web/.*\.(ts|tsx|js|jsx)$
