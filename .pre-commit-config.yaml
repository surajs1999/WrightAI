repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: web-typecheck
        name: Web TypeScript check
        language: system
        entry: bash -c 'cd web && npx tsc --noEmit'
        pass_filenames: false
        files: ^web/.*\.(ts|tsx)$
      - id: web-eslint
        name: Web ESLint
        language: system
        entry: bash -c 'cd web && npx eslint .'
        pass_filenames: false
        files: ^web/.*\.(ts|tsx|js|jsx)$
